name: Generate GitHub Stats

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Create stats directory
        run: mkdir -p stats

      - name: Download GitHub Stats
        run: |
          curl -s -o stats/github-stats.svg "https://github-readme-stats.vercel.app/api?username=GAUTAMMANAK1&show_icons=true&theme=tokyonight&hide_border=true&bg_color=0d1117&title_color=58a6ff&icon_color=1f6feb&text_color=c9d1d9&ring_color=1f6feb&include_all_commits=true&count_private=true"

      - name: Download Streak Stats
        run: |
          curl -s -o stats/streak-stats.svg "https://streak-stats.demolab.com?user=GAUTAMMANAK1&theme=tokyonight&hide_border=true&background=0d1117&stroke=1f6feb&ring=1f6feb&fire=58a6ff&currStreakLabel=58a6ff&sideLabels=58a6ff&dates=c9d1d9"

      - name: Download Top Languages
        run: |
          curl -s -o stats/top-langs.svg "https://github-readme-stats.vercel.app/api/top-langs/?username=GAUTAMMANAK1&theme=tokyonight&hide_border=true&bg_color=0d1117&title_color=58a6ff&text_color=c9d1d9&layout=compact&langs_count=8"

      - name: Download Activity Graph
        run: |
          curl -s -o stats/activity-graph.svg "https://github-readme-activity-graph.vercel.app/graph?username=GAUTAMMANAK1&bg_color=0d1117&color=58a6ff&line=1f6feb&point=58a6ff&area_color=1f6feb&area=true&hide_border=true&custom_title=Contribution%20Graph"

      - name: Download GitHub Trophies
        run: |
          curl -s -o stats/trophies.svg "https://github-profile-trophy.vercel.app/?username=GAUTAMMANAK1&theme=darkhub&no-frame=true&margin-w=10&column=7"

      - name: Download Top Contributed Repos
        run: |
          curl -s -o stats/top-contrib.svg "https://github-contributor-stats.vercel.app/api?username=GAUTAMMANAK1&limit=5&theme=tokyonight&combine_all_yearly_contributions=true"

      - name: Verify downloads
        run: |
          echo "=== File sizes ==="
          ls -la stats/
          echo ""
          for f in stats/*.svg; do
            size=$(wc -c < "$f")
            if [ "$size" -lt 500 ]; then
              echo "WARNING: $f is only $size bytes — may have failed"
            else
              echo "OK: $f ($size bytes)"
            fi
          done

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stats/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update GitHub stats images"
            git push
          fi
