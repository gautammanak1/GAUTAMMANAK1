name: Metrics

on:
  push:
    branches: [main]
  schedule:
    - cron: '45 22 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:

      - name: GitHub Stats
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GH_TOKEN }}
          filename: stats/github-stats.svg
          user: GAUTAMMANAK1
          template: classic
          base: header, activity, community, repositories
          base_indepth: yes
          config_display: large
          config_timezone: Asia/Kolkata
          config_output: svg

      - name: Top Languages
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GH_TOKEN }}
          filename: stats/top-langs.svg
          user: GAUTAMMANAK1
          template: classic
          base: ""
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_analysis_timeout: 30
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          config_display: large
          config_timezone: Asia/Kolkata
          config_output: svg

      - name: Achievements
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GH_TOKEN }}
          filename: stats/achievements.svg
          user: GAUTAMMANAK1
          template: classic
          base: ""
          plugin_achievements: yes
          plugin_achievements_display: detailed
          plugin_achievements_threshold: C
          plugin_achievements_secrets: yes
          config_display: large
          config_timezone: Asia/Kolkata
          config_output: svg

      - name: Notable Contributions
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GH_TOKEN }}
          filename: stats/notable.svg
          user: GAUTAMMANAK1
          template: classic
          base: ""
          plugin_notable: yes
          plugin_notable_from: all
          plugin_notable_repositories: yes
          plugin_notable_indepth: yes
          plugin_notable_types: commit, pull_request, issue
          config_display: large
          config_timezone: Asia/Kolkata
          config_output: svg

      - name: Starred Topics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GH_TOKEN }}
          filename: stats/topics.svg
          user: GAUTAMMANAK1
          template: classic
          base: ""
          plugin_topics: yes
          plugin_topics_mode: icons
          plugin_topics_limit: 0
          config_display: large
          config_timezone: Asia/Kolkata
          config_output: svg

      - name: Commit Calendar
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GH_TOKEN }}
          filename: stats/calendar.svg
          user: GAUTAMMANAK1
          template: classic
          base: ""
          plugin_calendar: yes
          plugin_calendar_limit: 2
          config_display: large
          config_timezone: Asia/Kolkata
          config_output: svg

      - name: Coding Habits
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GH_TOKEN }}
          filename: stats/habits.svg
          user: GAUTAMMANAK1
          template: classic
          base: ""
          plugin_habits: yes
          plugin_habits_charts_type: classic
          plugin_habits_days: 30
          plugin_habits_facts: yes
          config_display: large
          config_timezone: Asia/Kolkata
          config_output: svg
